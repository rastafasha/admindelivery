<section>
    <div class="pt-2 px-4 pl-lg-0 pr-xl-5">
        <div class="row">

            <div class="col-lg-12">
                <div class="border-bottom boton-title">
                    <a href="javascript:;" (click)="PageSize()" class="btn btn-primary">
                        <i class="fa fa-refresh"></i></a>
                </div>

                <app-loading *ngIf="cargando"></app-loading>
                <div class="row " *ngIf="!cargando">

                    <div class="col-md-6 col-lg-4 "
                        *ngFor="let item of comentarios |  paginate: { itemsPerPage: count, currentPage: p } | orderBy:'createdAt, desc'">

                        <div class="card ">
                            <div class="card-body">
                                <div class="d-flex flex-column">
                                    <p class="box-title m-b-0"><b>Usuario:</b> {{item.user.first_name}} {{item.user.last_name}}</p>
                                    <p class="box-title m-b-0"><b>Comentario:</b> {{item.comentario}}</p>
                                    <p class="box-title m-b-0"><b>Pros:</b> {{item.pros}}</p>
                                    <p class="box-title m-b-0"><b>Cons:</b> {{item.cons}}</p>
                                    <h4 class="card-title"><span class="lstick"></span>
                                        <span class="font-size-ms text-muted">
                                            {{item.createdAt|date :'MMM d, y, h:mm:ss a'}}
                                        </span>
                                    </h4>
                                    <div>
                                        <div>
                                            <div class="star-rating" *ngIf="item.estrellas == 5">
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled active"></i>
                                            </div>
                                            <div class="star-rating" *ngIf="item.estrellas >= 4 && item.estrellas < 5">
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                            </div>
                                            <div class="star-rating" *ngIf="item.estrellas >= 3 && item.estrellas < 4">
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                            </div>
                                            <div class="star-rating" *ngIf="item.estrellas >= 2 && item.estrellas < 3">
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                            </div>
                                            <div class="star-rating" *ngIf="item.estrellas >= 1 && item.estrellas < 2">
                                                <i class="sr-star czi-star-filled active"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                            </div>
                                            <div class="star-rating" *ngIf="item.estrellas >= 0 && item.estrellas < 1">
                                                <i class="sr-star czi-star-filled"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                                <i class="sr-star czi-star-filled"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>


                                <!-- <div class="d-flex justify-content-between align-items-center">
                                   
                                    <button type="button" class="btn btn-danger" (click)="eliminarPedido(item)">
                                        <span class="czi-delete-document"></span> Eliminar</button>
                                </div> -->
                            </div>
                        </div>
                    </div>

                </div>
                <div class="col-lg-12" *ngIf="!cargando">
                    <pagination-controls (pageChange)="p = $event"></pagination-controls>
                </div>
            </div>
        </div>

    </div>
</section>
