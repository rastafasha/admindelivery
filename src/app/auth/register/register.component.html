<!-- ============================================================== -->
<!-- Main wrapper - style you can find in pages.scss -->
<!-- ============================================================== -->
<section id="wrapper" class="login-register login-sidebar"
    style="background-image:url(../assets/images/background/login-register.jpg);">
    <div class="login-box card">
        <div class="card-body">
            <form [formGroup]="registerForm" (ngSubmit)="crearUsuario()" autocapitalize="off"
                class="form-horizontal form-material" id="loginform">
                <div class="logologin">
                    <img src="../assets/svg/logo-zlipmenu_logotipo.svg" alt="Home" />
                </div>
                <p class="text-center">Admin</p>

                <h3 class="box-title m-t-40 m-b-0">Registro</h3>

                <!-- Step Indicators -->
                <div class="step-indicators text-center mb-4">
                    <span class="step-circle {{currentStep >= 1 ? 'active' : ''}}">1</span>
                    <span class="step-line"></span>
                    <span class="step-circle {{currentStep >= 2 ? 'active' : ''}}">2</span>
                </div>
                <div class="form-group m-t-20" *ngIf="currentStep === 1">
                    <div class="col-xs-12">
                        <input class="form-control" type="text" formControlName="first_name" placeholder="Nombre">
                        <div *ngIf="registerForm.get('first_name')?.touched && registerForm.get('first_name')?.invalid"
                            class="text-danger">
                            <div *ngIf="registerForm.get('first_name')?.errors?.['required']">
                                Campo Requerido
                            </div>
                            <div *ngIf="registerForm.get('first_name')?.errors?.['minlength']">
                                Mínimo 3 Caracteres
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-group m-t-20" *ngIf="currentStep === 1">
                    <div class="col-xs-12">
                        <input class="form-control" type="text" formControlName="last_name" placeholder="Apellido">
                        <div *ngIf="registerForm.get('last_name')?.touched && registerForm.get('last_name')?.invalid"
                            class="text-danger">
                            <div *ngIf="registerForm.get('last_name')?.errors?.['required']">
                                Campo Requerido
                            </div>
                            <div *ngIf="registerForm.get('last_name')?.errors?.['minlength']">
                                Mínimo 3 Caracteres
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-group " *ngIf="currentStep === 2">
                    <div class="col-xs-12">
                        <input class="form-control" type="email" formControlName="email" placeholder="Email">
                        <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
                            class="text-danger">
                            <div *ngIf="registerForm.get('email')?.errors?.['required']">
                                Campo Requerido
                            </div>
                            <div *ngIf="registerForm.get('email')?.errors?.['email']">
                                Email no válido
                            </div>
                            <div *ngIf="registerForm.get('email')?.errors?.['minlength']">
                                Mínimo 3 Caracteres
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-group " *ngIf="currentStep === 2">
                    <div class="col-xs-12">
                        <input class="form-control" type="password" formControlName="password" placeholder="Password">
                        <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
                            class="text-danger">
                            <div *ngIf="registerForm.get('password')?.errors?.['required']">
                                Campo Requerido
                            </div>
                            <div *ngIf="registerForm.get('password')?.errors?.['minlength']">
                                Mínimo 3 Caracteres
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-group" *ngIf="currentStep === 2">
                    <div class="col-xs-12">
                        <input class="form-control" type="password" formControlName="password2"
                            placeholder="Confirm Password">

                        <div *ngIf="registerForm.get('password2')?.touched && registerForm.get('password2')?.invalid"
                            class="text-danger">
                            <div *ngIf="registerForm.get('password2')?.errors?.['required']">
                                Campo Requerido
                            </div>
                            <div *ngIf="registerForm.get('password2')?.errors?.['minlength']">
                                Mínimo 3 Caracteres
                            </div>
                            <div *ngIf="registerForm.get('password2')?.errors?.['noEsIgual']">
                                Las contraseñas no coinciden
                            </div>
                        </div>
                    </div>
                </div>
                <!-- <div class="form-group row">
                    <div class="col-md-12">
                        <div class="checkbox checkbox-primary p-t-0">
                            <input id="checkbox-signup" formControlName="terminos" type="checkbox">
                            <label for="checkbox-signup"> I agree to all <a href="#">Terms</a></label>
                        </div>
                    </div>
                </div> -->

                <div class="form-group text-center m-t-20">
                    <div class="col-xs-12">
                        <div *ngIf="currentStep === 1" class="text-center">
                            <button class="btn btn-info btn-md btn-block text-uppercase waves-effect waves-light m-r-10"
                                type="button" (click)="nextStep()">
                                Siguiente
                            </button>
                        </div>
                        <div *ngIf="currentStep === 2" class="text-center">
                            <button class="btn btn-secondary btn-md m-r-10" type="button" (click)="prevStep()">
                                Volver
                            </button>
                            <button class="btn btn-info btn-md btn-block text-uppercase waves-effect waves-light"
                                type="submit">Sign Up</button>
                        </div>
                    </div>
                </div>
                <div class="form-group m-b-0">
                    <div class="col-sm-12 text-center">
                        <p>¿Ya posee una cuenta? <a routerLink="/login" class="text-info m-l-5"><b>Ingresar</b></a>
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
<!-- ============================================================== -->
<!-- End Wrapper -->
<!-- ============================================================== -->
